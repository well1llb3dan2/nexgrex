<!doctype html>
<html lang="en" class="app-booting">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="description" content="One room. One pulse. All of us together." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NEXGREX" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>NEXGREX</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Restore theme before React renders to prevent flash of unstyled content
      try {
        var _t = localStorage.getItem("nexgrex-theme") || "midnight";
        document.documentElement.dataset.theme = _t;
      } catch (e) {}

      // Prevent rapid startup flicker by disabling transitions/animations briefly.
      (function () {
        var root = document.documentElement;
        var clearBootClass = function () {
          root.classList.remove("app-booting");
        };
        window.addEventListener("load", function () {
          requestAnimationFrame(function () {
            setTimeout(clearBootClass, 900);
          });
        });
      })();
    </script>
  </body>
</html>
